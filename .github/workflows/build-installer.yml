name: Build 1o1-ai Windows Installer

on:
  push:
    branches: [main]
    paths:
      - 'installer/**'
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-installer:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install NSIS
        run: choco install nsis -y
        shell: powershell

      - name: Verify NSIS installation
        run: |
          $nsisPath = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (Test-Path $nsisPath) {
            Write-Host "NSIS found at: $nsisPath"
            & $nsisPath /VERSION
          } else {
            Write-Host "Searching for makensis..."
            Get-ChildItem -Path "C:\" -Recurse -Filter "makensis.exe" -ErrorAction SilentlyContinue | Select-Object FullName
          }
        shell: powershell

      - name: Build installer with full NSIS path
        run: |
          $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) {
            $makensis = (Get-ChildItem -Path "C:\" -Recurse -Filter "makensis.exe" -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          }
          Write-Host "Using makensis at: $makensis"
          & $makensis installer\setup.nsi
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        shell: powershell

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: 1o1-ai-windows-installer
          path: installer\1o1-ai-setup.exe
          retention-days: 30

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: installer\1o1-ai-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
